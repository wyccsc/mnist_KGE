apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-service
  labels:
    app: frontend-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend-service

  template:
    metadata:
      labels:
        app: frontend-service

    spec:
      containers:
        - name: frontend-service
          image: asia-east1-docker.pkg.dev/project-4b2b1b7d-749b-4bd1-93b/my-repo/kge_frontend-service:1.0.4
          ports:
            - containerPort: 80

          env:
            - name: API_SERVICE_URL
              value: "http://api-service:8000"
              