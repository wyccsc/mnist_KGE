apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  labels:
    app: api-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-service

  template:
    metadata:
      labels:
        app: api-service

    spec:
      containers:
        - name: api-service
          image: asia-east1-docker.pkg.dev/project-4b2b1b7d-749b-4bd1-93b/my-repo/kge_api-service:1.0.3
          ports:
            - containerPort: 8000

          env:
            - name: MODEL_SERVICE_URL
              value: "http://model-service:8000"