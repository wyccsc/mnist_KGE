apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: model-service

  template:
    metadata:
      labels:
        app: model-service

    spec:
      containers:
        - name: model-service
          image: asia-east1-docker.pkg.dev/project-4b2b1b7d-749b-4bd1-93b/my-repo/kge_model-service:1.0.3
          ports:
            - containerPort: 8000